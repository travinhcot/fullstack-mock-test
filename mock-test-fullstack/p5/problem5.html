<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="./problem5.css">
     <title>Problem 5</title>
</head>
<body>
    <form id="form">
        <div class="mb-3">
            <label for="computer-name" class="form-label">Computer Name</label>
            <input type="text" class="form-control" id="computer-name">
        </div>
        <select id="computer-type" required>
            <option value="">Select a computer type</option>
            <option value="Office">Office</option>
            <option value="Gaming">Gaming</option>
            <option value="AI">AI</option>
        </select>
        <button type="submit" class="create-btn btn-primary">Create</button>
    </form>
    <div class="comp-list">
        <h2>Computer List</h2>
        <ol id="computer-list"></ol>
    </div>
    <script src="./problem5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
