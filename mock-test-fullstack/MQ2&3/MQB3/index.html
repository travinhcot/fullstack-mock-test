<!DOCTYPE html>

  <head>

      td {
        padding: 5px;

  <body>

    <table class="m-auto">
      <tr>
        <th>Name</th>
        <th>Score</th>
        <th></th>
      </tr>
    
      <tbody id="tableBody">
    
      </tbody>

    <form class="pt-4 text-center" id="courseForm">
      <div>
        <label for="courseNameInput">Name</label>
        <input type="text" id="courseNameInput" name="name">
      </div>

      <div>
        <label for="courseScoreInput">Score</label>
        <input type="text" id="courseScoreInput" name="score">
      </div>

      <br />
      <button class="btn btn-success" type="submit">
        Create
      </button>
    </form>

  </body>


  <!-- Bootstrap CSS -->
